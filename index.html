<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beard-Bouncers</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background-color: #0A0404;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }
        #id-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            user-select: none;
            z-index: 10;
        }
        #box-container {
            position: relative;
            width: 95vmin;
            height: 95vmin;
            outline: 4px solid #ffffff;
            overflow: hidden;
        }
        .george-sprite {
            position: absolute;
            top: 0;
            left: 0;
            width: 15vmin;
            height: auto;
            user-select: none;
            will-change: transform;
        }
        #ui-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 10;
        }
        #score-board {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            user-select: none;
        }
        .ui-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        .ui-btn:hover {
            opacity: 0.8;
        }
        #reset-btn {
            background-color: #555555;
            color: #ffffff;
        }
        #shop-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: #111111;
            border: 2px solid #ffffff;
            padding: 15px;
            width: 280px;
            margin-top: 10px;
            flex-direction: column;
            gap: 12px;
        }
        .tabs {
            display: flex;
            gap: 5px;
            border-bottom: 1px solid #555555;
            padding-bottom: 5px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #888888;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            padding: 4px 8px;
            text-transform: uppercase;
        }
        .tab-btn.active {
            color: #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        .tab-content {
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .tab-content.active {
            display: flex;
        }
        .shop-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            color: #ffffff;
        }
        .item-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .item-subtext {
            font-size: 11px;
            color: #aaaaaa;
            margin-top: -2px;
        }
        .buy-btn {
            background-color: #00ff00;
            color: #000000;
            border: none;
            padding: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .buy-btn:disabled {
            background-color: #555555;
            color: #888888;
            cursor: not-allowed;
        }

        /* Dev Menu Layout Styling */
        #dev-wrapper {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            z-index: 10;
        }
        #dev-btn {
            background-color: #ff0055;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        #dev-btn:hover {
            opacity: 0.8;
        }
        #dev-menu {
            display: none;
            background-color: #111111;
            border: 2px solid #ff0055;
            padding: 15px;
            width: 280px;
            flex-direction: column;
            gap: 12px;
            color: #ffffff;
        }
        .dev-title {
            font-size: 16px;
            font-weight: bold;
            color: #ff0055;
            text-transform: uppercase;
            border-bottom: 1px solid #555555;
            padding-bottom: 5px;
        }
        .dev-row {
            display: flex;
            gap: 5px;
        }
        .dev-input {
            width: 100px;
            background: #222222;
            border: 1px solid #555555;
            color: #ffffff;
            padding: 4px;
            font-weight: bold;
        }
        .dev-action-btn {
            flex-grow: 1;
            background-color: #ff0055;
            color: #ffffff;
            border: none;
            padding: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="id-display">000000000</div>
    
    <!-- Dev Menu Button & Content -->
    <div id="dev-wrapper">
        <div id="dev-menu">
            <div class="dev-title">Dev Controls</div>
            <div class="dev-row">
                <input type="number" id="dev-coin-input" class="dev-input" value="1000">
                <button id="dev-add-coins" class="dev-action-btn">Add Coins</button>
            </div>
            <div class="dev-row">
                <input type="number" id="dev-mult-input" class="dev-input" value="5">
                <button id="dev-add-mult" class="dev-action-btn">Add Mult</button>
            </div>
            <div class="dev-row">
                <input type="number" id="dev-george-input" class="dev-input" value="10">
                <button id="dev-add-george" class="dev-action-btn">Spawn Bouncers</button>
            </div>
        </div>
        <button id="dev-btn">Dev Menu</button>
    </div>

    <div id="ui-wrapper">
        <div id="score-board">COINS:0</div>
        <button id="shop-btn" class="ui-btn">Open Shop</button>
        <button id="reset-btn" class="ui-btn">Reset Game</button>
        <div id="shop-menu">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('upgrades-tab')">Upgrades</button>
                <button class="tab-btn" onclick="switchTab('georges-tab')">Bouncers</button>
            </div>
            <!-- Tab 1: Stat Upgrades -->
            <div id="upgrades-tab" class="tab-content active">
                <div class="shop-item">
                    <div class="item-info">
                        <span>Multiplier (x<span id="mult-val">1</span>)</span>
                        <span id="mult-cost">Cost: 10</span>
                    </div>
                    <button id="buy-mult" class="buy-btn">Upgrade</button>
                </div>
                <div class="shop-item">
                    <div class="item-info">
                        <span>Speed (+<span id="speed-val">0</span>)</span>
                        <span id="speed-cost">Cost: 25</span>
                    </div>
                    <button id="buy-speed" class="buy-btn">Upgrade</button>
                </div>
            </div>
            <!-- Tab 2: Extra Georges -->
            <div id="georges-tab" class="tab-content">
                <div class="shop-item">
                    <div class="item-info">
                        <span>Regular George</span>
                        <span id="george-cost">Cost: 50</span>
                    </div>
                    <div class="item-subtext">Gives 1 coin per bounce base value.</div>
                    <div class="item-subtext">Owned: <span id="george-count">1</span></div>
                    <button id="buy-george" class="buy-btn">Buy Bouncer</button>
                </div>
            </div>
        </div>
    </div>

    <div id="box-container">
        <!-- Sprites will be generated dynamically by JavaScript -->
    </div>

    <script>
        const container = document.getElementById('box-container');
        const scoreBoard = document.getElementById('score-board');
        const idDisplay = document.getElementById('id-display');
        const shopBtn = document.getElementById('shop-btn');
        const resetBtn = document.getElementById('reset-btn');
        const shopMenu = document.getElementById('shop-menu');
        const buyMultBtn = document.getElementById('buy-mult');
        const multValSpan = document.getElementById('mult-val');
        const multCostSpan = document.getElementById('mult-cost');
        const buySpeedBtn = document.getElementById('buy-speed');
        const speedValSpan = document.getElementById('speed-val');
        const speedCostSpan = document.getElementById('speed-cost');
        const buyGeorgeBtn = document.getElementById('buy-george');
        const georgeCountSpan = document.getElementById('george-count');
        const georgeCostSpan = document.getElementById('george-cost');

        // Dev Elements
        const devWrapper = document.getElementById('dev-wrapper');
        const devBtn = document.getElementById('dev-btn');
        const devMenu = document.getElementById('dev-menu');
        const devCoinInput = document.getElementById('dev-coin-input');
        const devAddCoinsBtn = document.getElementById('dev-add-coins');
        const devMultInput = document.getElementById('dev-mult-input');
        const devAddMultBtn = document.getElementById('dev-add-mult');
        const devGeorgeInput = document.getElementById('dev-george-input');
        const devAddGeorgeBtn = document.getElementById('dev-add-george');

        const SECRET_ID = "542185987";

        // Game State Variables
        let gameId = '';
        let coins = 0;
        let multiplier = 1;
        let speedUpgrades = 0;
        let totalGeorges = 1;
        let multCost = 10;
        let speedCost = 25;
        let georgeCost = 50;

        // Bouncer physics storage array
        let bouncers = [];
        let lastTimestamp = performance.now();

        function generateGameId() {
            const num = Math.floor(100000000 + Math.random() * 900000000);
            return num.toString();
        }

        // LocalStorage Logic: Save & Load
        function loadGame() {
            const savedData = localStorage.getItem('beardBouncersSave');
            if (savedData) {
                const save = JSON.parse(savedData);
                gameId = save.gameId || generateGameId();
                coins = save.coins || 0;
                multiplier = save.multiplier || 1;
                speedUpgrades = save.speedUpgrades || 0;
                totalGeorges = save.totalGeorges || 1;
                multCost = save.multCost || 10;
                speedCost = save.speedCost || 25;
                georgeCost = save.georgeCost || 50;

                if (save.lastSavedTime) {
                    const timePassedMs = Date.now() - save.lastSavedTime;
                    calculateOfflineEarnings(timePassedMs);
                }
            } else {
                gameId = generateGameId();
            }
            checkDevAccess();
            updateUI();
        }

        function saveGame() {
            const save = {
                gameId,
                coins,
                multiplier,
                speedUpgrades,
                totalGeorges,
                multCost,
                speedCost,
                georgeCost,
                lastSavedTime: Date.now()
            };
            localStorage.setItem('beardBouncersSave', JSON.stringify(save));
        }

        function clearAllBouncers() {
            bouncers.forEach(b => {
                if (b.element && b.element.parentNode) {
                    b.element.parentNode.removeChild(b.element);
                }
            });
            bouncers = [];
        }

        function resetProgress() {
            if (confirm("Are you sure you want to reset all progress? Your Player ID will not change.")) {
                // Clear UI objects
                clearAllBouncers();
                
                // Reset stats
                coins = 0;
                multiplier = 1;
                speedUpgrades = 0;
                totalGeorges = 1;
                multCost = 10;
                speedCost = 25;
                georgeCost = 50;

                // Close menus
                shopMenu.style.display = 'none';
                shopBtn.textContent = 'Open Shop';
                devMenu.style.display = 'none';

                // Re-initialize starting bouncer
                spawnBouncerDOM();

                // Sync storage and display
                updateUI();
                saveGame();
            }
        }

        function checkDevAccess() {
            if (gameId === SECRET_ID) {
                devWrapper.style.display = 'flex';
            } else {
                devWrapper.style.display = 'none';
                devMenu.style.display = 'none';
            }
        }

        function calculateOfflineEarnings(msElapsed) {
            const baseBouncesPerSec = 1.5 + (speedUpgrades * 0.2);
            const totalEstimatedBounces = (msElapsed / 1000) * baseBouncesPerSec * totalGeorges;
            const offlineRate = 0.5;
            const earnedCoins = Math.floor(totalEstimatedBounces * multiplier * offlineRate);
            if (earnedCoins > 0) {
                coins += earnedCoins;
                alert(`Welcome back! You earned ${earnedCoins} COINS while offline (50% rate).`);
            }
        }

        function updateUI() {
            idDisplay.textContent = gameId;
            scoreBoard.textContent = `COINS:${coins}`;
            multValSpan.textContent = multiplier;
            multCostSpan.textContent = `Cost: ${multCost}`;
            speedValSpan.textContent = speedUpgrades;
            speedCostSpan.textContent = `Cost: ${speedCost}`;
            georgeCountSpan.textContent = totalGeorges;
            georgeCostSpan.textContent = `Cost: ${georgeCost}`;
            updateShopButtons();
        }

        // Tab Navigation Interaction
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        shopBtn.addEventListener('click', () => {
            if (shopMenu.style.display === 'flex') {
                shopMenu.style.display = 'none';
                shopBtn.textContent = 'Open Shop';
            } else {
                shopMenu.style.display = 'flex';
                shopBtn.textContent = 'Close Shop';
                updateShopButtons();
            }
        });

        resetBtn.addEventListener('click', resetProgress);

        // Dev Menu UI Interaction
        devBtn.addEventListener('click', () => {
            if (devMenu.style.display === 'flex') {
                devMenu.style.display = 'none';
            } else {
                devMenu.style.display = 'flex';
            }
        });

        // Dev Actions Functional Logic
        devAddCoinsBtn.addEventListener('click', () => {
            const val = parseInt(devCoinInput.value, 10);
            if (!isNaN(val) && val > 0) {
                coins += val;
                updateUI();
                saveGame();
            }
        });

        devAddMultBtn.addEventListener('click', () => {
            const val = parseInt(devMultInput.value, 10);
            if (!isNaN(val) && val > 0) {
                multiplier += val;
                updateUI();
                saveGame();
            }
        });

        devAddGeorgeBtn.addEventListener('click', () => {
            const val = parseInt(devGeorgeInput.value, 10);
            if (!isNaN(val) && val > 0) {
                for (let i = 0; i < val; i++) {
                    totalGeorges += 1;
                    spawnBouncerDOM();
                }
                updateUI();
                saveGame();
            }
        });

        function updateShopButtons() {
            buyMultBtn.disabled = coins < multCost;
            buySpeedBtn.disabled = coins < speedCost;
            buyGeorgeBtn.disabled = coins < georgeCost;
        }

        buyMultBtn.addEventListener('click', () => {
            if (coins >= multCost) {
                coins -= multCost;
                multiplier += 1;
                multCost = Math.floor(multCost * 1.8);
                updateUI();
                saveGame();
            }
        });

        buySpeedBtn.addEventListener('click', () => {
            if (coins >= speedCost) {
                coins -= speedCost;
                speedUpgrades += 1;
                speedCost = Math.floor(speedCost * 1.5);
                bouncers.forEach(b => {
                    b.speedX = (3 + speedUpgrades) * Math.sign(b.speedX);
                    b.speedY = (3 + speedUpgrades) * Math.sign(b.speedY);
                });
                updateUI();
                saveGame();
            }
        });

        buyGeorgeBtn.addEventListener('click', () => {
            if (coins >= georgeCost) {
                coins -= georgeCost;
                totalGeorges += 1;
                georgeCost = Math.floor(georgeCost * 2.0);
                spawnBouncerDOM();
                updateUI();
                saveGame();
            }
        });

        // Object Engine & Physics Generation
        function spawnBouncerDOM() {
            const imgElement = document.createElement('img');
            imgElement.src = "George.png";
            imgElement.alt = "George";
            imgElement.className = "george-sprite";
            container.appendChild(imgElement);

            const bouncerObj = {
                element: imgElement,
                posX: 0,
                posY: 0,
                speedX: (3 + speedUpgrades) * (Math.random() > 0.5 ? 1 : -1),
                speedY: (3 + speedUpgrades) * (Math.random() > 0.5 ? 1 : -1),
                initialized: false
            };

            imgElement.addEventListener('load', () => {
                const limitX = container.clientWidth - imgElement.clientWidth;
                const limitY = container.clientHeight - imgElement.clientHeight;
                bouncerObj.posX = Math.random() * Math.max(0, limitX);
                bouncerObj.posY = Math.random() * Math.max(0, limitY);
                bouncerObj.initialized = true;
            });

            if (imgElement.complete) {
                setTimeout(() => {
                    if (!bouncerObj.initialized) {
                        const limitX = container.clientWidth - imgElement.clientWidth;
                        const limitY = container.clientHeight - imgElement.clientHeight;
                        bouncerObj.posX = Math.random() * Math.max(0, limitX);
                        bouncerObj.posY = Math.random() * Math.max(0, limitY);
                        bouncerObj.initialized = true;
                    }
                }, 50);
            }
            bouncers.push(bouncerObj);
        }

        function mainLoop(timestamp) {
            const elapsed = timestamp - lastTimestamp;
            lastTimestamp = timestamp;
            const steps = Math.min(Math.floor(elapsed / 16.66), 5) || 1;
            let totalBouncesThisFrame = 0;
            const boxWidth = container.clientWidth;
            const boxHeight = container.clientHeight;

            for (let s = 0; s < steps; s++) {
                bouncers.forEach(b => {
                    if (!b.initialized) return;
                    const imgWidth = b.element.clientWidth;
                    const imgHeight = b.element.clientHeight;

                    b.posX += b.speedX;
                    b.posY += b.speedY;

                    if (b.posX <= 0) {
                        b.posX = 0;
                        b.speedX = Math.abs(b.speedX);
                        totalBouncesThisFrame++;
                    } else if (b.posX + imgWidth >= boxWidth) {
                        b.posX = boxWidth - imgWidth;
                        b.speedX = -Math.abs(b.speedX);
                        totalBouncesThisFrame++;
                    }

                    if (b.posY <= 0) {
                        b.posY = 0;
                        b.speedY = Math.abs(b.speedY);
                        totalBouncesThisFrame++;
                    } else if (b.posY + imgHeight >= boxHeight) {
                        b.posY = boxHeight - imgHeight;
                        b.speedY = -Math.abs(b.speedY);
                        totalBouncesThisFrame++;
                    }
                });
            }

            bouncers.forEach(b => {
                if (b.initialized) {
                    b.element.style.transform = `translate(${b.posX}px, ${b.posY}px)`;
                }
            });

            if (totalBouncesThisFrame > 0) {
                coins += (totalBouncesThisFrame * multiplier);
                scoreBoard.textContent = `COINS:${coins}`;
                if (shopMenu.style.display === 'flex') {
                    updateShopButtons();
                }
            }
            requestAnimationFrame(mainLoop);
        }

        // Initialization runtime orchestration
        loadGame();
        for (let i = 0; i < totalGeorges; i++) {
            spawnBouncerDOM();
        }
        requestAnimationFrame(mainLoop);

        setInterval(saveGame, 5000);
        window.addEventListener('beforeunload', saveGame);

        window.addEventListener('resize', () => {
            const maxW = container.clientWidth;
            const maxH = container.clientHeight;
            bouncers.forEach(b => {
                const limitW = maxW - b.element.clientWidth;
                const limitH = maxH - b.element.clientHeight;
                if (b.posX > limitW) b.posX = Math.max(0, limitW);
                if (b.posY > limitH) b.posY = Math.max(0, limitH);
            });
        });
    </script>
</body>
</html>
